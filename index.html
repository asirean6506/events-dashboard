<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Events Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container topbar">
      <div>
        <p class="eyebrow">Frontend Demo</p>
        <h1>Live Events Dashboard</h1>
      </div>

      <div class="view-toggle" aria-label="Choose layout">
        <button class="toggle-btn is-active" data-view="grid" type="button">Grid</button>
        <button class="toggle-btn" data-view="list" type="button">List</button>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <div class="control-group">
        <label for="search">Search</label>
        <input id="search" type="text" placeholder="Search by city or venue" />
      </div>

      <div class="control-group">
        <label for="cityFilter">City</label>
        <select id="cityFilter">
          <option value="all">All Cities</option>
        </select>
      </div>

      <div class="control-group">
        <label for="sortBy">Sort</label>
        <select id="sortBy">
          <option value="date-asc">Date: Soonest First</option>
          <option value="date-desc">Date: Latest First</option>
          <option value="city-asc">City: A–Z</option>
        </select>
      </div>

      <div class="control-group">
        <label>
          <input id="favoritesOnly" type="checkbox" />
          Favorites only
        </label>
      </div>
    </section>

    <section class="summary-bar">
      <p id="resultsText">Loading shows…</p>
      <button id="clearFavorites" class="ghost-btn" type="button">Clear Favorites</button>
    </section>

    <section>
      <div id="showsContainer" class="shows-grid" aria-live="polite"></div>
      <p id="emptyState" class="empty-state hidden">No shows match your filters.</p>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>
</html>
